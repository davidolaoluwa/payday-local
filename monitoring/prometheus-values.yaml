prometheus:
  prometheusSpec:
    retention: 15d
    # discover ServiceMonitors in every namespace, not just labelled ones
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          resources:
            requests:
              storage: 10Gi
grafana:
  adminPassword: 'payday-grafana-2026'
  persistence:
    enabled: true
    storageClassName: standard
    size: 5Gi
  # Provision Loki as a data source up front (the real fix).
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      jsonData:
        maxLines: 1000
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          resources:
            requests:
              storage: 2Gi
