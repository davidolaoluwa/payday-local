apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: payday
spec:
  replicas: 3
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
      - name: api
        image: localhost:5000/payday/api:v1.0.0
        ports:
        - name: http
          containerPort: 3000
        envFrom:
        - secretRef: { name: payday-secrets }
        resources:
          requests: { memory: '128Mi', cpu: '100m' }
          limits:   { memory: '256Mi', cpu: '500m' }
        readinessProbe:
          httpGet: { path: /healthz, port: 3000 }
          initialDelaySeconds: 5
        livenessProbe:
          httpGet: { path: /healthz, port: 3000 }
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: payday
  labels: { app: api }
spec:
  selector: { app: api }
  ports:
  - name: http
    port: 3000
    targetPort: 3000
