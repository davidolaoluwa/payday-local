apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: payday
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: 'payday'
        - name: POSTGRES_DB
          value: 'payday'
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: payday-secrets, key: POSTGRES_PASSWORD }
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
  volumeClaimTemplates:
  - metadata: { name: data }
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: standard
      resources:
        requests: { storage: 2Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: payday
spec:
  selector: { app: postgres }
  ports:
  - port: 5432
    targetPort: 5432
