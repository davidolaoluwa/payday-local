apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: payday
spec:
  replicas: 1
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
      - name: worker
        image: localhost:5000/payday/worker:v1.0.0
        envFrom:
        - secretRef: { name: payday-secrets }
        resources:
          requests: { memory: '32Mi', cpu: '25m' }
          limits:   { memory: '64Mi', cpu: '100m' }
